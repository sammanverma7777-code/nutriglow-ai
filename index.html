<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriGlow AI (Beta)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NutriGlow AI</h1>
            <p>Smart personalized nutrition for modern lifestyles • Beta Version</p>
        </div>

        <div class="content">
            <div class="input-section">
                <div class="input-group">
                    <label>Gender</label>
                    <div class="gender-select" id="gender-select">
                        <div class="gender-option" data-gender="male" role="button" tabindex="0" aria-label="Select Male">
                            <span class="icon">👨</span>
                            <div>Male</div>
                        </div>
                        <div class="gender-option" data-gender="female" role="button" tabindex="0" aria-label="Select Female">
                            <span class="icon">👩</span>
                            <div>Female</div>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" placeholder="Enter your age" min="18" max="100">
                </div>

                <div class="input-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="Enter your weight" min="30" max="200" step="0.1">
                </div>

                <div class="input-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" placeholder="Enter your height" min="100" max="250" step="0.1">
                </div>

                <div class="input-group">
                    <label for="activity">Activity Level</label>
                    <select id="activity">
                        <option value="sedentary">Sedentary (little or no exercise)</option>
                        <option value="light">Light (exercise 1-3 days/week)</option>
                        <option value="moderate">Moderate (exercise 3-5 days/week)</option>
                        <option value="active">Active (exercise 6-7 days/week)</option>
                        <option value="very-active">Very Active (intense exercise daily)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button class="calculate-btn" onclick="calculateNutrition()" id="calcBtn">
                        Calculate My Nutrition Plan
                    </button>
                    <button class="print-btn" onclick="printResults()" style="display: none;" id="printBtn">
                        📄 Print/Save Plan
                    </button>
                    <button class="load-btn" onclick="loadPreviousPlan()" id="loadBtn">
                        📂 Load Previous
                    </button>
                </div>

                <div class="feedback-section">
                    <button class="feedback-btn" onclick="sendFeedback()">
                        💬 Give Feedback
                    </button>
                </div>
            </div>

            <div class="results" id="results">
                <!-- Results will be inserted here -->
            </div>
        </div>
    </div>

    <footer>
        Beta Version • Please Share Feedback ❤️
    </footer>

    <script src="script.js"></script>
</body>
</html>
